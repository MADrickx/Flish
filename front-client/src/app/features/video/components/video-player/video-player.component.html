<div class="header">
  <span class="title">{{ title() }}</span>
  <button class="close-btn" type="button" (click)="onClose()">Close</button>
</div>
<div class="player-container" #playerContainer></div>
@if (shortCode()) {
  <div class="stream-panel">
    <app-stream-link
      [shortCode]="shortCode()"
      [fileId]="fileId()"
      [isPublic]="isPublic()"
      [compact]="false"
    />
  </div>
}

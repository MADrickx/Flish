<div class="header">
  <span class="title">{{ title() }}</span>
  <button class="close-btn" type="button" (click)="closed.emit()">Close</button>
</div>
<video
  #videoEl
  [src]="src()"
  controls
  autoplay
  preload="metadata"
></video>
<div class="hint">Space: play/pause &middot; Left/Right: seek 10s &middot; F: fullscreen &middot; Esc: close</div>

@if (compact()) {
  <span class="code" [title]="secureUrl">{{ shortCode() }}</span>
  <button class="copy-btn" type="button" (click)="copy('public')" [title]="publicUrl">
    {{ copied() === 'public' ? 'Copied' : 'Copy' }}
  </button>
} @else {
  <div class="expanded">
    <div class="code-display">{{ shortCode() }}</div>
    <div class="url-row">
      <span class="label">Secure (VLC login once)</span>
      <code class="url">{{ secureUrl }}</code>
      <button class="copy-btn" type="button" (click)="copy('secure')">
        {{ copied() === 'secure' ? 'Copied!' : 'Copy' }}
      </button>
    </div>
    <div class="url-row">
      <span class="label">Quick (no login)</span>
      <code class="url">{{ publicUrl }}</code>
      <button class="copy-btn" type="button" (click)="copy('public')">
        {{ copied() === 'public' ? 'Copied!' : 'Copy' }}
      </button>
    </div>
  </div>
}

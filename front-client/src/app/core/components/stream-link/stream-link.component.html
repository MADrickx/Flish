@if (compact()) {
  <span class="code" [title]="secureUrl">{{ shortCode() }}</span>
  @if (isPublic()) {
    <button class="copy-btn" type="button" (click)="copy('public')" [title]="publicUrl">
      {{ copied() === 'public' ? 'Copied' : 'Copy' }}
    </button>
  }
} @else {
  <div class="expanded">
    <div class="code-display">{{ shortCode() }}</div>
    <div class="url-row">
      <span class="label">Secure (VLC login once)</span>
      <code class="url">{{ secureUrl }}</code>
      <button class="copy-btn" type="button" (click)="copy('secure')">
        {{ copied() === 'secure' ? 'Copied!' : 'Copy' }}
      </button>
    </div>

    @if (isPublic()) {
      <div class="url-row">
        <span class="label">Public (no login)</span>
        <code class="url">{{ publicUrl }}</code>
        <button class="copy-btn" type="button" (click)="copy('public')">
          {{ copied() === 'public' ? 'Copied!' : 'Copy' }}
        </button>
      </div>
    }

    <div class="visibility-row">
      <button
        class="toggle-btn"
        type="button"
        (click)="toggleVisibility()"
        [disabled]="toggling()"
        [class.is-public]="isPublic()"
      >
        {{ isPublic() ? 'Make Private' : 'Make Public' }}
      </button>
      <span class="visibility-label">{{ isPublic() ? 'Anyone with the link can access' : 'Only authenticated users' }}</span>
    </div>
  </div>
}
